<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Плейсхолдер: канапе (фото появится позже)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F2ECE3"/>
    </linearGradient>
    <radialGradient id="plate" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="82%" stop-color="#F6F0E6"/>
      <stop offset="100%" stop-color="#E4DCCF"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#B08D57"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- soft ambient gold glow (drifts slowly, drinkit-style) -->
  <circle cx="400" cy="300" r="230" fill="#B08D57" opacity="0.06">
    <animate attributeName="opacity" values="0.05;0.10;0.05" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="r" values="220;240;220" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- plate + food group: gentle vertical float (the "живое фото" drift) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -9; 0 0" dur="6s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>

    <ellipse cx="400" cy="400" rx="215" ry="60" fill="#1C1815" opacity="0.05"/>
    <circle cx="400" cy="322" r="170" fill="url(#plate)" stroke="#E4DCCF" stroke-width="2"/>
    <circle cx="400" cy="322" r="170" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.55"/>

    <!-- three canapé bites, each with its own micro-bob -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="4.5s" repeatCount="indefinite"/>
      <rect x="330" y="290" width="52" height="34" rx="6" fill="#EFE6D6" stroke="url(#gold)" stroke-width="1.5"/>
      <circle cx="356" cy="300" r="9" fill="#C9A961" opacity="0.7"/>
      <rect x="342" y="312" width="28" height="5" rx="2.5" fill="#7C6A55" opacity="0.5"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="5.2s" begin="0.6s" repeatCount="indefinite"/>
      <rect x="418" y="300" width="52" height="34" rx="6" fill="#F6F0E6" stroke="url(#gold)" stroke-width="1.5"/>
      <ellipse cx="444" cy="311" rx="14" ry="8" fill="#B08D57" opacity="0.55"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -3.5;0 0" dur="4.8s" begin="1.1s" repeatCount="indefinite"/>
      <rect x="374" y="330" width="52" height="34" rx="6" fill="#EFE6D6" stroke="url(#gold)" stroke-width="1.5"/>
      <circle cx="400" cy="341" r="8" fill="#7E8B6B" opacity="0.6"/>
    </g>

    <!-- steam wisps (rising, fading — the "hot & fresh" cue) -->
    <g stroke="#B08D57" stroke-width="2.5" fill="none" opacity="0.35" stroke-linecap="round">
      <path d="M360 250 q-8 -18 4 -34 q10 -14 2 -30">
        <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite"/>
      </path>
      <path d="M440 250 q8 -18 -4 -34 q-10 -14 -2 -30">
        <animate attributeName="opacity" values="0;0.4;0" dur="4s" begin="1.3s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- label -->
  <text x="400" y="540" text-anchor="middle" font-family="Georgia, 'Cormorant', serif" font-size="26" fill="#1C1815" opacity="0.72">Канапе</text>
  <text x="400" y="566" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" letter-spacing="2" fill="#8A6D3B" opacity="0.8">ФОТО ПОЯВИТСЯ ПОЗЖЕ</text>
</svg>
