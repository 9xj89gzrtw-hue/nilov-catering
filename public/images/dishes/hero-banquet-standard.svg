<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Grilled salmon">
  <defs>
    <clipPath id="clip-circle"><circle cx="600" cy="600" r="540"/></clipPath>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF7F2"/>
      <stop offset="100%" style="stop-color:#F2ECE3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  <!-- Subtle pattern -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="#E4DCCF" opacity="0.3"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#dots)"/>
  <!-- Frame -->
  <circle cx="600" cy="600" r="540" fill="none" stroke="rgba(176, 141, 87, 0.5)" stroke-width="1.5"/>
  <!-- Label -->
  
  <text 
    x="600" 
    y="1104" 
    text-anchor="middle" 
    font-family="Georgia, serif" 
    font-size="42.00000000000001" 
    fill="#4A423B" 
    font-style="italic"
    opacity="0.7"
  >Grilled salmon</text>
  
  <!-- Decorative accent -->
  <line x1="480" y1="96" x2="720" y2="96" stroke="#C9A961" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>