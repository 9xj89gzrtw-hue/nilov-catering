<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Banquet atmosphere — 100 guests">
  <defs>
    
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF7F2"/>
      <stop offset="100%" style="stop-color:#F2ECE3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  <!-- Subtle pattern -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="#E4DCCF" opacity="0.3"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#dots)"/>
  <!-- Frame -->
  <rect x="20" y="20" width="1880" height="1040" rx="12" fill="none" stroke="rgba(176, 141, 87, 0.5)" stroke-width="1.5"/>
  <!-- Label -->
  
  <text 
    x="960" 
    y="993.6" 
    text-anchor="middle" 
    font-family="Georgia, serif" 
    font-size="37.800000000000004" 
    fill="#4A423B" 
    font-style="italic"
    opacity="0.7"
  >Banquet atmosphere — 100 guests</text>
  
  <!-- Decorative accent -->
  <line x1="768" y1="86.4" x2="1152" y2="86.4" stroke="#C9A961" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>